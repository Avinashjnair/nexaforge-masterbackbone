<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexaForge ERP — SME Manufacturing Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css?v=7.1"/>
  <link rel="stylesheet" href="css/sidebar.css?v=7.1"/>
  <link rel="stylesheet" href="css/dashboard.css?v=6.0"/>
  <link rel="stylesheet" href="css/production.css?v=6.0"/>
  <link rel="stylesheet" href="css/quality.css?v=6.0"/>
  <link rel="stylesheet" href="css/marketing.css?v=6.0"/>
  <link rel="stylesheet" href="css/procurement.css?v=6.0"/>
  <link rel="stylesheet" href="css/inventory.css?v=6.0"/>
  <link rel="stylesheet" href="css/finance.css?v=6.0"/>
  <link rel="stylesheet" href="css/hr.css?v=7.0"/>
  <link rel="stylesheet" href="css/welding.css?v=6.0"/>
  <link rel="stylesheet" href="css/analytics.css?v=6.0"/>
  <link rel="stylesheet" href="css/s16-design.css?v=7.0"/>
  <link rel="stylesheet" href="css/bento-theme.css?v=6.0"/>
  <link rel="stylesheet" href="css/qc-reports.css?v=4.0"/>
</head>
<body data-dept="gm">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="11" height="11" rx="2" fill="var(--brand)"/>
          <rect x="15" y="2" width="11" height="11" rx="2" fill="var(--brand)" opacity="0.5"/>
          <rect x="2" y="15" width="11" height="11" rx="2" fill="var(--brand)" opacity="0.5"/>
          <rect x="15" y="15" width="11" height="11" rx="2" fill="var(--brand)"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">NexaForge</span>
        <span class="brand-sub">ERP Platform</span>
      </div>
    </div>

    <!-- Project selector -->
    <div class="project-selector">
      <div class="project-current">
        <div class="project-dot"></div>
        <div class="project-info">
          <span class="project-label">Active project</span>
          <span class="project-name" id="activeProject">— No project selected —</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>

    <!-- Sidebar nav — populated dynamically from GET /me/permissions after login -->
    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">GM</div>
        <div class="user-info">
          <span class="user-name">General Manager</span>
          <span class="user-role">Executive access</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="4" r="1" fill="currentColor"/><circle cx="7" cy="7" r="1" fill="currentColor"/><circle cx="7" cy="10" r="1" fill="currentColor"/></svg>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main">
    <!-- Top bar -->
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span>Dashboard</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="dept-badge" id="deptBadge" style="display:none"></span>
        <div class="topbar-status">
          <span class="status-dot" id="wsStatusDot" style="background:var(--text-muted)" title="Live feed disconnected"></span>
          <span class="status-label">Event bus</span>
        </div>
        <button class="topbar-btn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 00-5 5v3l-1.5 2.5h13L14 10V7a5 5 0 00-5-5z" stroke="currentColor" stroke-width="1.4"/><path d="M7 14.5a2 2 0 004 0" stroke="currentColor" stroke-width="1.4"/></svg>
          <span class="notif-dot"></span>
        </button>
        <span id="topbarUser" style="font-size:12px;color:var(--text-secondary);padding:0 4px"></span>
        <button class="topbar-btn" title="Sign out" onclick="handleLogout()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 3H3a1 1 0 00-1 1v10a1 1 0 001 1h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M12 12l3-3-3-3M15 9H7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- Page content container -->
    <div class="page-content" id="pageContent">
      <!-- Pages are injected here by JS -->
    </div>
  </main>

  <!-- Global notification toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="js/api.js?v=4.0"></script>
  <script src="js/socket-client.js?v=3.0"></script>
  <script src="js/login.js?v=3.2"></script>
  <script src="js/app.js?v=4.5"></script>
  <script src="js/dashboard.js?v=3.0"></script>
  <script src="js/bento-ui.js?v=3.0"></script>
  <script src="js/dept-dashboards.js?v=3.0"></script>
  <script src="js/projects.js?v=3.0"></script>
  <script src="js/production.js?v=4.1"></script>
  <script src="js/qc.js?v=6.4"></script>
  <script src="js/qc-reports.js?v=1.0"></script>
  <script src="js/quality.js"></script>
  <script src="js/quality2.js"></script>
  <script src="js/marketing.js?v=4.3"></script>
  <script src="js/marketing2.js?v=4.3"></script>
  <script src="js/procurement.js?v=3.0"></script>
  <script src="js/inventory.js?v=3.1"></script>
  <script src="js/finance.js?v=3.0"></script>
  <script src="js/finance2.js?v=3.0"></script>
  <script src="js/hr.js?v=4.0"></script>
  <script src="js/hr2.js?v=4.0"></script>
  <script src="js/welding.js?v=3.1"></script>
  <script src="js/welding2.js?v=3.1"></script>
  <script src="js/analytics.js?v=3.0"></script>
  <script src="js/analytics2.js?v=3.0"></script>
  <script src="js/pages.js?v=3.0"></script>
  <script src="js/s16-ui.js?v=3.0"></script>
</body>
</html>
