# Mosquitto config for NexaForge ERP dev environment
listener 1883
allow_anonymous true

# WebSocket listener for browser clients
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
