# NexaForge ERP — Nginx reverse proxy + SSL
# Place at: /etc/nginx/sites-available/nexaforge
# Enable: ln -s /etc/nginx/sites-available/nexaforge /etc/nginx/sites-enabled/

upstream nexaforge_api {
    # PM2 cluster — all workers listen on 3000
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name erp.nexaforge.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — API + Frontend ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.nexaforge.com;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/erp.nexaforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.nexaforge.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload limit for BOM/DXF/PDF files
    client_max_body_size 50M;

    # ── Frontend SPA (static files) ──────────────────────────────
    root /var/www/nexaforge/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://nexaforge_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Auth endpoints ────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://nexaforge_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Socket.io WebSocket ──────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://nexaforge_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # hold WebSocket connections open
    }

    # ── Health check (no auth required) ─────────────────────────
    location /health {
        proxy_pass http://nexaforge_api;
        access_log off;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}
