# Mosquitto config — TLS enabled (production / staging)
# Port 1883 (plaintext) is disabled; TLS on 8883 only.

# ── TLS listener ──────────────────────────────────────────────────
listener 8883
protocol mqtt
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
tls_version tlsv1.2
allow_anonymous false
# Password file: run  mosquitto_passwd -c /mosquitto/config/passwd <username>
password_file /mosquitto/config/passwd
require_certificate false

# ── WebSocket TLS listener (browser IIoT dashboards) ─────────────
listener 9443
protocol websockets
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
tls_version tlsv1.2
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
