name: Deploy — Production

on:
  push:
    tags:
      - "v*"

jobs:
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest

    environment: production   # requires manual approval in GitHub Environments settings

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/nexaforge/backend
            git fetch --tags
            git checkout ${{ github.ref_name }}
            npm ci --omit=dev
            NODE_ENV=production npx knex migrate:latest --knexfile knexfile.js
            pm2 reload nexaforge-api --update-env
            echo "Production deploy ${{ github.ref_name }} complete at $(date)"

      - name: Smoke test production health endpoint
        run: |
          sleep 10
          curl --fail --silent --show-error https://${{ secrets.PROD_DOMAIN }}/health || exit 1

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: *Production deployed* — ${{ github.repository }} `${{ github.ref_name }}` by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":fire: *Production deploy FAILED* — `${{ github.ref_name }}` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
