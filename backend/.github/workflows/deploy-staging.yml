name: Deploy — Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: []   # runs independently; CI is a separate workflow

    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/nexaforge/backend
            git pull origin main
            npm ci --omit=dev
            NODE_ENV=staging npx knex migrate:latest --knexfile knexfile.js
            pm2 reload nexaforge-api --update-env
            echo "Staging deploy complete at $(date)"

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Staging deployed* — ${{ github.repository }} @ `${{ github.sha }}` by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Staging deploy FAILED* — ${{ github.repository }} @ `${{ github.sha }}` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
