<!DOCTYPE html>
<html lang="en" data-dept="production">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaForge ERP</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NexaForge" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #0d0f12;
      --bg-surface: #13171d;
      --bg-elevated: #1a1f28;
      --border: #1e2530;
      --text-primary: #e8eaf0;
      --text-secondary: #7a8394;
      --text-muted: #4a5261;
      --accent: #f97316;        /* Production — forge amber */
      --accent-dim: rgba(249,115,22,.12);
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --sidebar-w: 240px;
      --header-h: 56px;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    #app { display: contents; }

    /* ── Login ── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-base);
    }
    .login-card {
      width: 380px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .login-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 32px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .field input {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .login-error { color: #f43f5e; font-size: 13px; margin-top: 12px; }

    /* ── Shell layout ── */
    .shell { display: flex; height: 100vh; overflow: hidden; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-brand {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .brand-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.3px;
    }
    .brand-dept {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-top: 2px;
    }

    .nav-section { padding: 12px 0; }
    .nav-label {
      padding: 0 16px 6px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      color: var(--text-secondary);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 0;
      transition: background .12s, color .12s;
      border-left: 3px solid transparent;
      text-decoration: none;
    }
    .nav-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-icon { width: 16px; text-align: center; font-size: 15px; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .user-role { font-size: 11px; color: var(--text-secondary); }
    .logout-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color .15s;
    }
    .logout-btn:hover { color: #f43f5e; }

    /* ── Main content ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      height: var(--header-h);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .topbar-badge {
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* ── Remote loading states ── */
    .remote-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      font-size: 13px;
      gap: 10px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .remote-error {
      background: rgba(244,63,94,.08);
      border: 1px solid rgba(244,63,94,.2);
      border-radius: 8px;
      padding: 20px 24px;
      color: #f43f5e;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ── Service Worker registration ──────────────────────────
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js", { scope: "/" })
          .then(reg => {
            console.info("[SW] registered, scope:", reg.scope);
            // Listen for replayed offline mutations
            navigator.serviceWorker.addEventListener("message", (e) => {
              if (e.data?.type === "SYNC_REPLAYED") {
                window.dispatchEvent(new CustomEvent("nf:sync-replayed", { detail: e.data }));
              }
              if (e.data?.type === "NAVIGATE") {
                window.location.hash = e.data.url.replace(/^.*#/, "#") || "";
              }
            });
          })
          .catch(err => console.warn("[SW] registration failed:", err));
      });
    }

    // ── Offline mutation interceptor ─────────────────────────
    // Wraps fetch for POST/PATCH to offline-queue when navigator.onLine is false
    (function patchFetch() {
      const QUEUEABLE = ["/api/weld-joints", "/api/projects", "/api/ncr", "/api/itp"];
      const _fetch = window.fetch.bind(window);
      window.fetch = async function(input, init = {}) {
        const url    = typeof input === "string" ? input : input.url;
        const method = (init.method || "GET").toUpperCase();
        const shouldQueue =
          !navigator.onLine &&
          ["POST", "PATCH", "PUT"].includes(method) &&
          QUEUEABLE.some(p => url.includes(p));

        if (shouldQueue) {
          let body;
          try { body = JSON.parse(init.body); } catch (_) { body = init.body; }
          await sendToServiceWorker("ENQUEUE_MUTATION", { method, url, body, headers: init.headers });
          // Return an optimistic 202 so the UI doesn't error
          return new Response(JSON.stringify({ queued: true, offline: true }), {
            status: 202,
            headers: { "Content-Type": "application/json", "X-Nexaforge-Queued": "1" },
          });
        }
        return _fetch(input, init);
      };

      function sendToServiceWorker(type, payload) {
        return navigator.serviceWorker.ready.then(reg => {
          if (reg.active) reg.active.postMessage({ type, ...payload });
        }).catch(() => {});
      }
    })();

    // ── Offline indicator ────────────────────────────────────
    function updateOnlineStatus() {
      let badge = document.getElementById("nf-offline-badge");
      if (!navigator.onLine) {
        if (!badge) {
          badge = document.createElement("div");
          badge.id = "nf-offline-badge";
          badge.textContent = "⚡ Offline — changes will sync when reconnected";
          Object.assign(badge.style, {
            position: "fixed", bottom: "16px", left: "50%",
            transform: "translateX(-50%)",
            background: "#f97316", color: "#fff",
            padding: "8px 18px", borderRadius: "20px",
            fontSize: "13px", fontWeight: "600",
            zIndex: "9999", boxShadow: "0 4px 12px rgba(0,0,0,.4)",
          });
          document.body.appendChild(badge);
        }
      } else {
        badge?.remove();
      }
    }
    window.addEventListener("online",  updateOnlineStatus);
    window.addEventListener("offline", updateOnlineStatus);
    updateOnlineStatus();
  </script>
</body>
</html>
